# Build and push Docker image to Amazon ECR with Trivy scan and Cosign signing
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - "src/api/**"
      - ".github/workflows/build-push.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: demo
    permissions:
      contents: write
      id-token: write # Cần thiết cho Cosign nếu dùng keyless (ở đây dùng key-based)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      # --- BƯỚC 1: BUILD LÀM VẬT MẪU ĐỂ QUÉT LỖ HỔNG ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          load: true
          tags: temp-scan-image:latest

      # --- BƯỚC 2: CHẠY TRIVY SCAN ---
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "temp-scan-image:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true # Không block bởi các lỗi chưa có bản vá
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      # --- BƯỚC 3: BUILD VÀ PUSH THẬT LÊN ECR ---
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # --- BƯỚC 4: CÀI ĐẶT COSIGN VÀ KÝ SỐ LÊN ẢNH ---
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign the published Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}@${{ steps.build-push.outputs.digest }}"

      # --- BƯỚC 5: CẬP NHẬT FILE ROLLOUT ---
      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: .*|image: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }} [skip ci]"
            git push
          fi

      - name: Create git tag
        run: |
          git tag v${{ steps.semver.outputs.version }}
          git push origin v${{ steps.semver.outputs.version }}
