# Service: Expose API pods
# Sync wave 1: Expose pods sau khi Rollout đã tạo
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
  labels:
    app: api
    reconcile: "2"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
  - name: http
    port: 80
    targetPort: 5000
